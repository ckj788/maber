<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MABER - Checkout</title>
  <meta name="theme-color" content="#000000" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000;
      --ink: #f3f3f1;
      --ink-dim: #b8b8b8;
      --frame: rgba(255, 255, 255, 0.05);
      --radius: 14px;
      --shadow: 0 20px 50px rgba(0, 0, 0, .8);
    }

    * { box-sizing: border-box }
    body {
      margin: 0; color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
      background: #000000;
    }
    .wrap { max-width: 760px; margin: 80px auto; padding: 0 18px }
    h1 {
      margin: 0 0 14px;
      font-family: 'Cinzel', Georgia, serif;
      font-size: clamp(22px, 3.2vw, 30px);
      text-shadow: 0 10px 30px rgba(0,0,0,.35);
    }
    .card {
      border: 1px solid var(--frame); border-radius: var(--radius); padding: 24px;
      background: linear-gradient(180deg, rgba(255, 255, 255, .03), rgba(255, 255, 255, 0));
      box-shadow: var(--shadow)
    }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px }
    .grid-1 { display: grid; gap: 12px }
    label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .06em; color: var(--ink-dim) }
    input, select {
      width: 100%; padding: 12px 12px; border: 1px solid #1f1f22;
      background: #060608; color: #fff; border-radius: 12px; outline: none;
      font-family: 'Inter', sans-serif;
    }
    input:focus, select:focus { border-color: rgba(255,255,255,0.2); box-shadow: 0 0 0 5px rgba(255,255,255,.05) }
    .row { display: grid; gap: 10px; margin-top: 14px }
    .paybox { margin-top: 16px; display: grid; gap: 12px }
    .btn-ghost {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
      background: transparent; color: var(--ink-dim); cursor: pointer;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
    }
    .btn-ghost:hover {
      border-color: rgba(255,255,255,0.25);
      color: #fff;
    }
    .foot {
      margin-top: 16px; color: var(--ink-dim); font-size: 12px;
      line-height: 1.6;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 16px;
    }
    .error { display: none }
    .ok { display: none }
    .marks { opacity: .9 }
    .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,.08), transparent); margin: 8px 0 }
  </style>
  <!-- Stripe.js -->
  <script src="https://js.stripe.com/v3"></script>
</head>

<body>
  <div class="wrap">
    <h1 style="text-align: center; margin-bottom: 20px;">Complete your purchase</h1>
    <div class="card" style="max-width: 500px; margin: 0 auto;">
      <div class="grid-1">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
          <span style="font-size: 15px; color: var(--ink-dim);">MABER Detailed Report</span>
          <span style="font-size: 18px; font-weight: bold; color: #fff;">$19.90 <span style="font-size: 13px; text-decoration: line-through; color: var(--ink-dim); font-weight: normal; margin-left: 5px;">$39.90</span></span>
        </div>
        <div class="divider"></div>
        <input id="email" type="hidden" value="buyer@maber.xyz">
      </div>

      <div class="divider"></div>

      <div class="row">
        <div class="marks" id="paypal-marks"></div>
        <div class="paybox">
          <div id="paypal-button-container"></div>
          <div id="card-button-container"></div>
        </div>
        <div id="payOk" class="ok"></div>
        <div id="payError" class="error"></div>
        <button id="retry" class="btn-ghost" type="button">🔄 Re-initialize</button>
      </div>

      <div class="foot">
        We use Stripe for secure payments. After your purchase, you can view your report immediately and download the PDF. Having trouble? Please contact support.
      </div>

    </div>
  </div>

  <script>
    /* ====== Constants ====== */
    const API_CREATE_INTENT = '/api/stripe/create-intent';
    const API_CONFIG = '/api/stripe/config';
    const API_SAVE = '/api/report/save';
    const REDIRECT_REPORT = '/report.html';

    /* ====== Influencer ref from URL ====== */
    const URL_PARAMS = new URLSearchParams(location.search);
    function getRefSafe() {
      const raw = URL_PARAMS.get('ref') || '';
      if (!raw) return '';
      return String(raw).slice(0, 40); // 简单长度限制
    }

    /* ====== Utils ====== */
    const $ = s => document.querySelector(s);
    const isEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(v||'').trim());
    function getEmail() { return $('#email').value.trim(); }
    function getPayload() {
      return {
        email: getEmail(), fname: '', lname: '',
        addr1: '', city: '', state: '',
        zip: '', country: 'US'
      };
    }
    function readSeeds() {
      try {
        const payload = JSON.parse(localStorage.getItem('maber:payload') || '{}');
        return {
          name: payload.form?.name || '',
          gender: payload.form?.gender || '',
          dob: payload.form?.dob || '',
          tob: payload.form?.tob || '',
          address: payload.form?.address || '',
          persona: payload.persona || '',
          tri: payload.tri || null,
          early: payload.early || null,
          mid: payload.mid || null,
          late: payload.late || null,
          codes: payload.codes || null,
        };
      } catch { return {}; }
    }
    function makeReportUrl(orderID, email) {
      const u = new URL('/report-print.html', location.origin);
      if (orderID) u.searchParams.set('orderID', orderID);
      if (email) u.searchParams.set('email', email);
      const ref = getRefSafe();
      if (ref) u.searchParams.set('ref', ref);
      return u.pathname + u.search;
    }
    function cleanupButtons() {
      $('#paypal-button-container').innerHTML = '';
      $('#card-button-container').innerHTML = '';
      $('#paypal-marks').innerHTML = '';
    }

    // 轻量提示 + 宕机时解锁按钮/可重试
    function showInline(msg) {
      const host = document.querySelector('#paypal-button-container');
      if (!host) return;
      let tip = host.querySelector('[data-tip]');
      if (!tip) { tip = document.createElement('div'); tip.dataset.tip = '1'; tip.style.cssText='font-size:12px;color:#b8b8b8;opacity:.9;margin-top:6px'; host.appendChild(tip); }
      tip.textContent = msg || '';
    }

    function showError(msg) {
      const el = document.getElementById('payError');
      if (el) {
        if (msg) {
          el.textContent = msg;
          el.style.display = 'block';
          el.style.padding = '10px 14px';
          el.style.background = '#2a1a1a';
          el.style.border = '1px solid #5b2f2f';
          el.style.color = '#ff8a8a';
          el.style.borderRadius = '10px';
          el.style.marginTop = '12px';
          el.style.fontSize = '13px';
        } else {
          el.style.display = 'none';
        }
      } else if (msg) {
        alert(msg);
      }
    }
    function panic(msg, retryFn) {
      console.warn('[stripe:init] ', msg);
      showInline(msg + '  Click "Re-initialize" to retry.');
      const btn = document.getElementById('stripe-pay-btn');
      if (btn) { btn.disabled = false; btn.textContent = 'pay now'; btn.onclick = retryFn; }
    }

    // 把任意 SVG（文本 / dataURL / URL）转为 PNG dataURL（兜底）
    async function svgAnyToPngDataURL(svgMaybe, outW = 800) {
      try {
        if (!svgMaybe) return '';
        if (typeof svgMaybe === 'string' && svgMaybe.startsWith('data:image/png')) return svgMaybe;

        let svgUrl = '';
        if (typeof svgMaybe === 'string' && svgMaybe.trim().startsWith('<svg')) {
          const blob = new Blob([svgMaybe], { type: 'image/svg+xml' });
          svgUrl = URL.createObjectURL(blob);
        } else if (typeof svgMaybe === 'string' && svgMaybe.startsWith('data:image/svg+xml')) {
          svgUrl = svgMaybe;
        } else if (typeof svgMaybe === 'string' && svgMaybe.startsWith('http')) {
          svgUrl = svgMaybe;
        } else { return ''; }

        const img = new Image();
        img.crossOrigin = 'anonymous';
        await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = svgUrl; });

        const ratio = img.height / Math.max(1, img.width);
        const w = outW, h = Math.max(1, Math.round(w * ratio));

        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        try { if (svgUrl.startsWith('blob:')) URL.revokeObjectURL(svgUrl); } catch {}
        return canvas.toDataURL('image/png');
      } catch { return ''; }
    }

    async function afterPaidAndCaptured(orderID, buyerEmail) {
      const seeds = readSeeds();
      const reportUrl = makeReportUrl(orderID, buyerEmail);
      try {
        localStorage.setItem('maber:orderId', orderID);
        localStorage.setItem('maber:email', buyerEmail);
      } catch (e) {}
      try {
        await fetch(API_SAVE, {
          method: 'POST', headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            orderId: orderID, email: buyerEmail, url: reportUrl,
            name: seeds.name, gender: seeds.gender, dob: seeds.dob, tob: seeds.tob, address: seeds.address || '',
            persona: seeds.persona || (seeds.tri && seeds.tri.O),
            tri: seeds.tri, early: seeds.early, mid: seeds.mid, late: seeds.late, codes: seeds.codes
          })
        });
      } catch {}
      location.href = `${REDIRECT_REPORT}?orderID=${encodeURIComponent(orderID)}&email=${encodeURIComponent(buyerEmail)}`;
    }

    // 在原容器挂载 Stripe Element + 按钮
    function mountStripeUI() {
      const host = document.querySelector('#paypal-button-container');
      if (!host) throw new Error('Missing #paypal-button-container');
      host.innerHTML = '';

      const el = document.createElement('div');
      el.id = 'payment-element';
      el.style.margin = '12px 0 16px';
      host.appendChild(el);

      const btn = document.createElement('button');
      btn.id = 'stripe-pay-btn';
      btn.type = 'button';
      btn.textContent = 'loading…';
      btn.disabled = true;
      btn.style.cssText = 'width:100%;padding:12px 14px;border-radius:12px;border:1px solid #2a2a2a;background:#0e0e10;color:#fff;cursor:pointer';
      host.appendChild(btn);

      return { el, btn };
    }

    async function ensureStripeJs() {
      if (window.Stripe) return;
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://js.stripe.com/v3'; s.async = true; s.crossOrigin = 'anonymous';
        s.onload = resolve; s.onerror = () => reject(new Error('Stripe.js load failed'));
        document.head.appendChild(s);
      });
    }

    async function initPayUI(force) {
      if (window.__payInitLock && !force) return;
      window.__payInitLock = true;
      cleanupButtons();

      const urlEmail = (new URLSearchParams(location.search)).get('email') || '';
      if (urlEmail && !$('#email').value) $('#email').value = urlEmail;

      const ui = mountStripeUI();
      showInline('Initializing Stripe…');

      try {
        await ensureStripeJs();

        // 1) publishable key
        const cfgRes = await fetch(API_CONFIG);
        const cfgTxt = await cfgRes.text();
        let cfg; try { cfg = JSON.parse(cfgTxt); } catch {}
        if (!cfgRes.ok || !cfg?.publishableKey) {
          return panic('Stripe config error: ' + cfgTxt, () => initPayUI(true));
        }
        const stripe = Stripe(cfg.publishableKey);
        console.log('[stripe] pk ok');

        // 2) 创建 PaymentIntent（不依赖邮箱）
        const seeds = readSeeds();
        const payload = getPayload(); // 允许为空
        const intentRes = await fetch(API_CREATE_INTENT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: '',
            metadata: {
              name: seeds.name || `${payload.fname || ''} ${payload.lname || ''}`.trim(),
              gender: seeds.gender || '', dob: seeds.dob || '', tob: seeds.tob || '',
              persona: seeds.persona || '',
              ref: getRefSafe(),    // ★ 新增：记录博主 ref
              ...payload
            }
          })
        });
        const intentTxt = await intentRes.text();
        let intent; try { intent = JSON.parse(intentTxt); } catch {}
        if (!intentRes.ok || !intent?.clientSecret) {
          return panic('Create intent failed: ' + intentTxt, () => initPayUI(true));
        }
        const clientSecret = intent.clientSecret;
        const paymentIntentId = intent.id;
        console.log('[stripe] intent ok', paymentIntentId);

        // 3) 挂载 Payment Element
        try {
          const elements = stripe.elements({
            clientSecret: clientSecret,
            locale: 'en'
          });
          const paymentElement = elements.create('payment', {
            fields: {
              billingDetails: {
                address: 'never'
              }
            }
          });
          paymentElement.mount('#payment-element');
          console.log('[stripe] element mounted');
          showInline('');

          // 4) 启用按钮
          ui.btn.disabled = false;
          ui.btn.textContent = 'pay now';
          ui.btn.onclick = async () => {
            const emailNow = getEmail();
            if (!isEmail(emailNow)) { const el = $('#email'); el.focus(); el.scrollIntoView({ behavior:'smooth', block:'center' }); return; }

            ui.btn.disabled = true; ui.btn.textContent = 'Please wait patiently while the page is redirecting...';
            showError(''); // 清除旧错误

            try {
              const refForJump = getRefSafe();
              let returnUrl = `${window.location.origin}${REDIRECT_REPORT}?orderID=${encodeURIComponent(paymentIntentId)}&email=${encodeURIComponent(emailNow)}`;
              if (refForJump) returnUrl += `&ref=${encodeURIComponent(refForJump)}`;

              const { error } = await stripe.confirmPayment({
                elements,
                confirmParams: {
                  return_url: returnUrl,
                  receipt_email: emailNow,
                  payment_method_data: {
                    billing_details: {
                      email: emailNow,
                      address: {
                        line1: '123 Main Street',
                        city: 'New York',
                        state: 'NY',
                        postal_code: '10001',
                        country: 'US'
                      }
                    }
                  }
                },
                redirect: 'if_required'
              });
              if (error) {
                console.warn('[stripe] confirm error:', error.message);
                showError(error.message);
                ui.btn.disabled = false; ui.btn.textContent = 'pay now';
                return;
              }
              // 成功 -> 上报 & 跳转
              try {
                const seeds2 = readSeeds();
                let trianglePng = localStorage.getItem('maber:trianglePng') || '';
                if (!trianglePng || !trianglePng.startsWith('data:image/png')) {
                  const triSvg = localStorage.getItem('maber:triangle') || '';
                  trianglePng = await svgAnyToPngDataURL(triSvg);
                  if (trianglePng) localStorage.setItem('maber:trianglePng', trianglePng);
                }
                const reportUrl = makeReportUrl(paymentIntentId, emailNow);
                const ref = getRefSafe();
                await fetch(API_SAVE, {
                  method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    orderId: paymentIntentId, email: emailNow, url: reportUrl,
                    name: seeds2.name || `${payload.fname || ''} ${payload.lname || ''}`.trim(),
                    gender: seeds2.gender || '', dob: seeds2.dob || '', tob: seeds2.tob || '', address: seeds2.address || '',
                    persona: seeds2.persona || (seeds2.tri && seeds2.tri.O),
                    tri: seeds2.tri, early: seeds2.early, mid: seeds2.mid, late: seeds2.late, codes: seeds2.codes,
                    ref,        // ★ 新增：保存到报告记录
                    trianglePng
                  })
                });
              } catch (e) { console.warn('[report/save] warn:', e); }
              let next = `${REDIRECT_REPORT}?orderID=${encodeURIComponent(paymentIntentId)}&email=${encodeURIComponent(emailNow)}`;
              if (refForJump) next += `&ref=${encodeURIComponent(refForJump)}`;
              location.href = next;
            } catch (e) {
              console.error('[stripe] click exception:', e);
              showError(e.message || String(e));
              ui.btn.disabled = false; ui.btn.textContent = 'pay now';
            }
          };
        } catch (mountErr) {
          return panic('Mount payment element error: ' + (mountErr.message || mountErr), () => initPayUI(true));
        }

      } catch (e) {
        panic('Init failed: ' + (e?.message || e), () => initPayUI(true));
      } finally {
        window.__payInitLock = false;
      }
    }

    // 重新初始化
    $('#retry').addEventListener('click', () => initPayUI(true));

    (() => {
      let lsEmail = 'buyer@maber.xyz';
      try {
        lsEmail = localStorage.getItem('maber:email') || 'buyer@maber.xyz';
      } catch (e) {}
      const urlEmail = (new URLSearchParams(location.search)).get('email') || lsEmail;
      if ($('#email')) $('#email').value = urlEmail;
    })();

    // 进页即初始化
    initPayUI();
  </script>
  <!-- Vercel Web Analytics & Speed Insights -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
